<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Des Examens Nationaux 2BAC SM de 1999 à 2026, avec les sujets et les corrigés disponibles en PDF.">
    <link rel="canonical" href="https://samiboutgoulla-smb.github.io/national-countdown/national.html" />
    <title>National 2 BAC SM - Examens PDF</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght=400;700;900&display=swap');

        body {
            margin: 0;
            padding: 40px 20px;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            min-height: 100vh;
        }

        .header-section {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 { font-size: 2.5rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }

        .nav-top-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .btn-back {
            display: inline-block;
            text-decoration: none;
            color: #b0bec5;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 30px;
            transition: all 0.3s;
            background: rgba(255,255,255,0.05);
            font-size: 0.9rem;
            font-weight: bold;
        }
        .btn-back:hover { background: rgba(255,255,255,0.15); color: white; transform: translateY(-2px); }

        .btn-to-countdown {
            border-color: rgba(220, 53, 69, 0.4);
            background: rgba(220, 53, 69, 0.1);
            color: #ffb3b9;
        }
        .btn-to-countdown:hover { background: rgba(220, 53, 69, 0.3); color: white; }

        #liste-examens {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .year-card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 20px;
            padding: 25px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .year-card h3 {
            margin-top: 0; font-size: 1.3rem; color: #a7ffeb;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 15px; display: flex; align-items: center;
        }

        .subject-row { display: flex; justify-content: space-between; align-items: center; margin: 12px 0; padding: 5px 0; }
        .subject-name { font-weight: 700; font-size: 0.9rem; color: #cfd8dc; }

        .btn-group { display: flex; gap: 8px; }

        .btn-link {
            text-decoration: none; font-size: 0.75rem; font-weight: bold;
            padding: 6px 12px; border-radius: 6px; transition: 0.2s; text-transform: uppercase;
        }
        .btn-s { background: #007bff; color: white; }
        .btn-c { background: #28a745; color: white; }
        .btn-link:hover { opacity: 0.8; transform: scale(1.05); }

        footer { text-align: center; margin-top: 50px; color: #78909c; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="header-section">
        <div class="nav-top-group">
            <a href="index.html" class="btn-back">← Accueil 2BAC SM</a>
            <a href="2bac.html" class="btn-back btn-to-countdown">⏳ Compte à Rebours 2BAC</a>
        </div>
        <h1>Nationaux 2BAC SM par SAMI BOUTGOULLA</h1>
    </div>

    <div id="liste-examens"></div>

    <footer>SMB - 1BAC SM</footer>

    <script>
        // Génération automatique des années de 2026 à 1999
        const annees = [];
        for (let annee = 2026; annee >= 1999; annee--) {
            annees.push(annee.toString());
        }
        
        // Matières principales de la filière SM
       // Matières principales de la filière SM
        const matieres = [
            { id: "maths", label: "Mathématiques" },
            { id: "physique", label: "Physique-Chimie" },
            { id: "svt", label: "SVT" }, // <-- Ligne ajoutée ici
            { id: "philo", label: "Philosophie" },
            { id: "anglais", label: "Anglais" }
        ];

        const container = document.getElementById('liste-examens');

        annees.forEach(annee => {
            let subjectsHtml = '';
            matieres.forEach(m => {
                subjectsHtml += `
                    <div class="subject-row">
                        <span class="subject-name">${m.label}</span>
                        <div class="btn-group">
                            <a href="NATIONAUX/${annee}/sujet/${m.id}.pdf" class="btn-link btn-s" target="_blank">Sujet</a>
                            <a href="NATIONAUX/${annee}/correction/corr_${m.id}.pdf" class="btn-link btn-c" target="_blank">Corr.</a>
                        </div>
                    </div>
                `;
            });

            container.innerHTML += `
                <div class="year-card">
                    <h3>Session Normale ${annee}</h3>
                    ${subjectsHtml}
                </div>
            `;
        });
    </script>
</body>
</html>
