<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compte à rebours - Régional 2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p.subtitle {
            font-size: 1.2rem;
            color: #b0bec5;
            margin-bottom: 50px;
        }

        .countdown-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .time-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 20px;
            min-width: 100px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .time-box span {
            display: block;
            font-size: 4rem;
            font-weight: 900;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .time-box .label {
            font-size: 1rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
            color: #eceff1;
        }

        footer {
            margin-top: 60px;
            font-size: 0.9rem;
            color: #78909c;
        }
    </style>
</head>
<body>

    <h1>Examen Régional 1 BAC</h1>
    <p class="subtitle">01 et 02 Juin 2026 - Objectif Excellence</p>

    <div class="countdown-container">
        <div class="time-box">
            <span id="days">00</span>
            <div class="label">Jours</div>
        </div>
        <div class="time-box">
            <span id="hours">00</span>
            <div class="label">Heures</div>
        </div>
        <div class="time-box">
            <span id="minutes">00</span>
            <div class="label">Minutes</div>
        </div>
        <div class="time-box">
            <span id="seconds">00</span>
            <div class="label">Secondes</div>
        </div>
    </div>

    <footer>
        Heure locale du Maroc (GMT+1)
    </footer>

    <script>
        // Date cible : 1er Juin 2026 à 08:00:00 (Fuseau horaire du Maroc : GMT+1)
        const targetDate = new Date("2026-06-01T08:00:00+01:00").getTime();

        const updateCountdown = () => {
            const now = new Date().getTime();
            const difference = targetDate - now;

            if (difference > 0) {
                const days = Math.floor(difference / (1000 * 60 * 60 * 24));
                const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((difference % (1000 * 60)) / 1000);

                document.getElementById("days").innerText = days.toString().padStart(2, '0');
                document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
                document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
                document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');
            } else {
                document.querySelector('.countdown-container').innerHTML = "<h2>C'est le jour J ! Bon courage !</h2>";
            }
        };

        // Met à jour le compteur chaque seconde
        setInterval(updateCountdown, 1000);
        updateCountdown(); // Appel initial pour éviter le délai d'une seconde
    </script>

</body>
</html>
