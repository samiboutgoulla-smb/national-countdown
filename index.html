<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Compte à rebours pour l'examen national de la filière 2BAC Sciences Mathématiques (SM) 2026.">
    <title>Compte à rebours - National 2026 (2BAC SM)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght=400;700;900&display=swap');

        body {
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        h2 { font-size: 1.8rem; color: #a7ffeb; text-transform: uppercase; letter-spacing: 2px; margin-top: 0; margin-bottom: 5px; }
        h1 { font-size: 3rem; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        p.subtitle { font-size: 1.2rem; color: #b0bec5; margin-bottom: 40px; }

        .countdown-container { 
            display: flex; 
            gap: 20px; 
            flex-wrap: wrap; 
            justify-content: center; 
            margin-bottom: 40px; 
        }
        
        .time-box {
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2); 
            border-radius: 15px;
            padding: 20px; 
            min-width: 110px; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        
        .time-box span { 
            display: block; 
            font-size: 4rem; 
            font-weight: 900; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5); 
        }
        
        .time-box .label { 
            font-size: 0.9rem; 
            font-weight: 400; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            margin-top: 5px; 
            color: #eceff1; 
        }

        .navigation-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            box-sizing: border-box;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .btn-main {
            display: block;
            background: #dc3545; 
            color: white; 
            text-decoration: none; 
            padding: 16px;
            border-radius: 8px; 
            font-size: 1.3rem; 
            font-weight: bold; 
            transition: background 0.3s, transform 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        .btn-main:hover { background: #c82333; transform: scale(1.02); }

        .secondary-links {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-secondary {
            flex: 1;
            min-width: 140px;
            background: rgba(255, 255, 255, 0.12);
            color: #e0f2f1;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px 20px; 
            border-radius: 8px; 
            font-size: 1rem; 
            font-weight: bold; 
            text-decoration: none;
            transition: background 0.3s, transform 0.2s;
        }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.22); transform: scale(1.02); }

        footer { margin-top: 60px; font-size: 0.9rem; color: #78909c; letter-spacing: 1px; }
    </style>
</head>
<body>

    <h2>ANNÉE SCOLAIRE : 2026-2027 </h2>
    <h1>Examen National 2 BAC SM</h1>
    <p class="subtitle">Début estimé des épreuves : 9 Juin 2027</p>

    <div class="countdown-container" id="national-container">
        <div class="time-box"><span id="days">00</span><div class="label">Jours</div></div>
        <div class="time-box"><span id="hours">00</span><div class="label">Heures</div></div>
        <div class="time-box"><span id="minutes">00</span><div class="label">Minutes</div></div>
        <div class="time-box"><span id="seconds">00</span><div class="label">Secondes</div></div>
    </div>

    <div class="navigation-box">
        <a href="national.html" class="btn-main">📚 Sujets & Corrections (1999 - 2026)</a>
        
        <div class="secondary-links">
            <a href="regional.html" class="btn-secondary">📝 Espace 1BAC</a>
            <a href="3ac.html" class="btn-secondary">🎓 Espace 3AC</a>
        </div>
    </div>

    <footer>SAMI BOUTGOULLA - SMB</footer>

    <script>
        // Date cible estimée pour l'examen National 2027
        const targetDate = new Date("2027-06-09T08:00:00+01:00").getTime();

        const updateCountdown = () => {
            const now = new Date().getTime();
            const difference = targetDate - now;

            if (difference > 0) {
                document.getElementById("days").innerText = Math.floor(difference / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
                document.getElementById("hours").innerText = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
                document.getElementById("minutes").innerText = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
                document.getElementById("seconds").innerText = Math.floor((difference % (1000 * 60)) / 1000).toString().padStart(2, '0');
            } else {
                document.getElementById("national-container").innerHTML = "<h2>Place aux épreuves ! Bon courage pour le National 2BAC SM ! 🌟</h2>";
            }
        };

        // Rafraîchissement toutes les secondes
        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
